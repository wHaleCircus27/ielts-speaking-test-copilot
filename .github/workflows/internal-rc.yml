name: Internal RC

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-app:
    name: build-arm64-app
    runs-on: macos-26
    timeout-minutes: 60
    env:
      RUSTUP_DIST_SERVER: https://static.rust-lang.org
      RUSTUP_UPDATE_ROOT: https://static.rust-lang.org/rustup
      RUSTUP_TOOLCHAIN: 1.95.0
    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
      - name: Verify ARM64 runner
        run: test "$(uname -m)" = "arm64"
      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 24.15.0
      - name: Activate pinned pnpm
        run: |
          corepack enable
          corepack prepare pnpm@11.1.3 --activate
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Install pinned Rust toolchain
        run: rustup toolchain install 1.95.0 --profile minimal --component clippy,rustfmt --target aarch64-apple-darwin
      - name: Fetch locked Rust dependencies
        run: cargo fetch --manifest-path src-tauri/Cargo.toml --locked --target aarch64-apple-darwin
      - name: Install pinned gitleaks
        env:
          GITLEAKS_SHA256: b40ab0ae55c505963e365f271a8d3846efbc170aa17f2607f13df610a9aeb6a5
        run: |
          archive="$RUNNER_TEMP/gitleaks_8.30.1_darwin_arm64.tar.gz"
          curl --fail --location --silent --show-error --output "$archive" https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_darwin_arm64.tar.gz
          actual_sha256="$(shasum -a 256 "$archive" | awk '{print $1}')"
          test "$actual_sha256" = "$GITLEAKS_SHA256"
          tar -xzf "$archive" -C "$RUNNER_TEMP" gitleaks
      - name: Scan complete Git history with redaction
        run: |
          "$RUNNER_TEMP/gitleaks" git --redact=100 --no-banner --exit-code 1 .
      - name: Audit production JavaScript dependencies
        run: pnpm security:pnpm
      - name: Install pinned cargo-audit
        run: cargo install cargo-audit --version 0.22.2 --locked
      - name: Audit Rust dependencies
        run: cargo audit --file src-tauri/Cargo.lock --target-os macos --target-arch aarch64
      - name: Verify repository
        run: pnpm verify
      - name: Build ad-hoc signed app
        run: pnpm bundle:app
        env:
          CARGO_NET_OFFLINE: "true"
      - name: Verify and archive app
        run: pnpm bundle:verify
      - name: Upload internal artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ielts-speaking-test-copilot-0.1.0-rc.1-arm64
          path: |
            src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.zip
            src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.sha256
          if-no-files-found: error
          retention-days: 7
