name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: verify
    runs-on: macos-26
    timeout-minutes: 45
    env:
      RUSTUP_DIST_SERVER: https://static.rust-lang.org
      RUSTUP_UPDATE_ROOT: https://static.rust-lang.org/rustup
      RUSTUP_TOOLCHAIN: 1.95.0
    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Verify ARM64 runner
        run: test "$(uname -m)" = "arm64"
      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 24.15.0
      - name: Activate pinned pnpm
        run: |
          corepack enable
          corepack prepare pnpm@11.1.3 --activate
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Install pinned Rust toolchain
        run: rustup toolchain install 1.95.0 --profile minimal --component clippy,rustfmt --target aarch64-apple-darwin
      - name: Fetch locked Rust dependencies
        run: cargo fetch --manifest-path src-tauri/Cargo.toml --locked --target aarch64-apple-darwin
      - name: Verify repository
        run: pnpm verify
      - name: Verify generated files are unchanged
        run: |
          if ! repository_status="$(git status --porcelain --untracked-files=all)"; then
            exit 1
          fi
          test -z "$repository_status"
